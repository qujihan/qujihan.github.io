{{ define "main" }}
<div class="mt-16 mx-auto w-2/3 lg:w-1/2">
    <table class="mx-auto min-w-full bg-white rounded-md overflow-hidden shadow-md ">
        {{ range $key, $value := .Data.Terms.Alphabetical }}
        {{ if $value.Name }}
        <tr class="border-b border-gray-200 hover:bg-gray-100 text-center sm:text-base md:text-lg lg:text-xl">
            <td class="py-2 sm:py-3 md:py-4 lg:py-5 px-4 sm:px-6 md:px-8 lg:px-10">
                <a class="text-blue-500 hover:text-blue-700" href="{{ relURL "/tags/"}}{{ $value.Name | urlize }}">
                    {{$value.Name}}
                </a>
            </td>
            <td class="py-2 sm:py-3 md:py-4 lg:py-5 px-4 sm:px-6 md:px-8 lg:px-10">{{$value.Count}}</td>
        </tr>
        {{ end }}
        {{ end }}
    </table>
</div>

{{ end }}
